services:
  auth:
    restart: always
    build: ./auth
    depends_on:
      - db 
    environment: # pass variables to the auth service 
      DB_HOST: db
      DB_USER: ${DB_USER} 
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    networks:
      - app-net
  ui:
    restart: always
    build: ./UI
    depends_on:
      - auth
      - weather
    environment:
      AUTH_HOST: auth
      AUTH_PORT: 8080
      WEATHER_HOST: weather
      WEATHER_PORT: 5000  # make sure this matches the port exposed by the weather service
    ports:
      - "3000:3000"
    networks:
      - app-net
  weather:
    restart: always
    build: ./weather
    environment:
      APIKEY: ${APIKEY}  # pass the API key as an environment variable
    networks:
      - app-net
  db:
    restart: always
    image: mysql:8.0.25  # use image instead of build for the database service
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    networks:
      - app-net
    volumes:
      - ./db-data:/var/lib/mysql   # persist database data on the host machine

networks:
  app-net:
    driver: bridge
volumes:
  db-data:
